name: "publish"

on:
  push:
    tags:
      - "v*"

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, ubuntu-22.04, windows-latest]

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: setup bun
        uses: oven-sh/setup-bun@v1

      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev libappindicator3-dev librsvg2-dev patchelf

      # ── Download yt-dlp sidecar ──
      - name: download yt-dlp (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path src-tauri/binaries
          Invoke-WebRequest -Uri "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe" -OutFile "src-tauri/binaries/yt-dlp-x86_64-pc-windows-msvc.exe"

      - name: download yt-dlp (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_linux"
          chmod +x src-tauri/binaries/yt-dlp-x86_64-unknown-linux-gnu

      - name: download yt-dlp (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          mkdir -p src-tauri/binaries
          curl -L -o src-tauri/binaries/yt-dlp-aarch64-apple-darwin "https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp_macos"
          chmod +x src-tauri/binaries/yt-dlp-aarch64-apple-darwin

      # ── Download ffmpeg sidecar ──
      - name: download ffmpeg (Windows)
        if: matrix.platform == 'windows-latest'
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "$env:TEMP\ffmpeg.zip"
          Expand-Archive -Path "$env:TEMP\ffmpeg.zip" -DestinationPath "$env:TEMP\ffmpeg_extract" -Force
          $ffmpegExe = Get-ChildItem "$env:TEMP\ffmpeg_extract" -Recurse -Filter "ffmpeg.exe" | Select-Object -First 1 -ExpandProperty FullName
          Copy-Item $ffmpegExe "src-tauri/binaries/ffmpeg-x86_64-pc-windows-msvc.exe"

      - name: download ffmpeg (Ubuntu)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          curl -L -o /tmp/ffmpeg.tar.xz "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz"
          tar xf /tmp/ffmpeg.tar.xz -C /tmp
          cp /tmp/ffmpeg-master-latest-linux64-gpl/bin/ffmpeg src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu
          chmod +x src-tauri/binaries/ffmpeg-x86_64-unknown-linux-gnu

      - name: download ffmpeg (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          curl -L -o /tmp/ffmpeg.zip "https://evermeet.cx/ffmpeg/getrelease/zip"
          unzip -o /tmp/ffmpeg.zip -d /tmp/ffmpeg_extract
          cp /tmp/ffmpeg_extract/ffmpeg src-tauri/binaries/ffmpeg-aarch64-apple-darwin
          chmod +x src-tauri/binaries/ffmpeg-aarch64-apple-darwin

      - name: install frontend dependencies
        run: bun install

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Flux Downloader v__VERSION__"
          releaseBody: |
            ## 🎉 Flux Downloader v__VERSION__

            Welcome to the new release of **Flux Downloader**! 🚀

            ### 📥 Download & Install

            Scroll down to the **Assets** section at the bottom of this page and download the file for your system:

            * 🪟 **Windows**: Download the `.msi` or `.exe` installer.
            * 🍎 **macOS**: Download the `.dmg` file.
            * 🐧 **Linux**: Download the `.AppImage` (runs anywhere) or `.deb` file.

            ---

            ### ✨ What's New

            * **Robust yt-dlp Updater**: The one-click update button in settings now flawlessly downloads the latest engine directly from GitHub, working elegantly across Windows, Mac, and Linux!
            * **Native OS Notifications**: Get sleek native alerts the moment your videos finish downloading.
            * **Browser Extension Support**: Introducing deep link integration (`fluxyt://`)! Add the Flux Extension to your browser to send URLs straight to the app.
            * **Improved Engine**: Major stability fixes for YouTube downloads, progress tracking, and playlist rendering.

            Thank you for using Flux Downloader! 💜
          releaseDraft: true
          prerelease: false
