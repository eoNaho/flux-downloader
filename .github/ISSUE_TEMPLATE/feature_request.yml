---
name: ✨ Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Flux Downloader better? We'd love to hear it!

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: Describe the feature you'd like to see.
      placeholder: "I'd like to be able to..."
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: Why would this feature be useful? What problem does it solve?
      placeholder: "This would help because..."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions or workarounds?

  - type: textarea
    id: mockups
    attributes:
      label: Mockups / Examples
      description: If applicable, add any mockups, screenshots, or links to similar features in other apps.

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature to you?
      options:
        - Nice to have
        - Important
        - Critical — blocking my workflow
